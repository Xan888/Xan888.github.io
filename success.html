<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Key — Xan's Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #05070a;
      --surface:      #0c0f14;
      --border:       rgba(160,175,195,0.1);
      --border-hover: rgba(160,175,195,0.22);
      --accent:       #a0afbf;
      --accent-bright:#c8d6e0;
      --accent-dim:   rgba(160,175,195,0.35);
      --text:         #cdd5de;
      --muted:        #4a5568;
      --steel:        #6b7f8f;
      --success:      #6aab7e;
      --success-dim:  rgba(106,171,126,0.15);
      --error:        #a06a6a;
      --error-dim:    rgba(160,106,106,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Star field ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Grid overlay ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(160,175,195,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(160,175,195,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 24s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Glow blobs ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -15%; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(100,130,155,0.07) 0%, transparent 70%);
      animation: pulse 7s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%; right: 5%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(80,100,120,0.06) 0%, transparent 70%);
      animation: pulse 9s ease-in-out infinite reverse;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.1); }
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(106,171,126,0.08);
      border: 1px solid rgba(106,171,126,0.2);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--success);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 7px rgba(106,171,126,0.6);
    }

    /* ── Heading ── */
    .heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 96px);
      line-height: 0.93;
      letter-spacing: 0.03em;
      text-align: center;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.7s 0.25s forwards;
    }
    .heading .line1 {
      display: block;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent-bright) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .heading .line2 {
      display: block;
      font-size: clamp(28px, 5vw, 48px);
      background: linear-gradient(135deg, var(--muted) 0%, var(--steel) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
    }

    /* ── Subtext ── */
    .subtext {
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      max-width: 380px;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s 0.55s forwards;
      transition: border-color 0.4s;
      backdrop-filter: blur(8px);
    }
    .card:hover { border-color: var(--border-hover); }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    }

    /* ── Key display ── */
    .key-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: left;
    }
    .key-box {
      background: rgba(160,175,195,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      font-family: 'DM Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 15px;
      word-break: break-all;
      color: var(--accent-bright);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 28px;
      min-height: 64px;
      display: flex;
      align-items: center;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .key-box::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--steel), transparent);
      border-radius: 12px 0 0 12px;
    }
    .key-box.error {
      color: var(--error);
      border-color: rgba(160,106,106,0.2);
      background: var(--error-dim);
    }
    .key-box.error::before {
      background: linear-gradient(180deg, var(--error), transparent);
    }
    .key-text { flex: 1; }

    /* ── Copy button ── */
    .btn-wrap { position: relative; }
    .btn-glow {
      position: absolute;
      inset: -3px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6b7f8f, #3a4a58);
      filter: blur(14px);
      opacity: 0.35;
      transition: opacity 0.3s;
      z-index: 0;
    }
    .btn-wrap:hover .btn-glow { opacity: 0.6; }

    .btn {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 32px;
      background: linear-gradient(135deg, #8fa0b0 0%, #4a5e6e 100%);
      color: #05070a;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.12);
    }
    .btn:active { transform: translateY(0) scale(0.99); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(0,0,0,0.18);
      border-radius: 6px;
      font-size: 13px;
      transition: transform 0.2s;
    }
    .btn:hover:not(:disabled) .btn-icon { transform: scale(1.15); }

    /* ── Copied toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid rgba(106,171,126,0.3);
      color: var(--success);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Note ── */
    .note {
      margin-top: 26px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.75s forwards;
      letter-spacing: 0.04em;
      font-weight: 300;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="wrapper">

    <div class="badge" id="badge">
      <span class="badge-dot"></span>
      <span id="badge-text">Checkpoint Complete</span>
    </div>

    <h1 class="heading">
      <span class="line1">Key Received</span>
      <span class="line2">Xan's Hub</span>
    </h1>

    <p class="subtext" id="subtext">
      Copy your key below and paste it into Roblox to get started.
    </p>

    <div class="card">
      <div class="key-label">Your Access Key</div>
      <div class="key-box" id="key-box">
        <span class="key-text" id="key-text">Loading...</span>
      </div>

      <div class="btn-wrap" id="btn-wrap">
        <button class="btn" id="copy-btn" onclick="copyKey()">
          <span class="btn-icon" id="btn-icon">⎘</span>
          Copy Key
        </button>
        <div class="btn-glow"></div>
      </div>
    </div>

    <p class="note">Paste your key inside Roblox to activate · Keep it safe</p>

  </div>

  <div class="toast" id="toast">✦ Key copied to clipboard</div>

  <script>
    // ── Populate key ──
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    const keyText = document.getElementById('key-text');
    const keyBox  = document.getElementById('key-box');
    const copyBtn = document.getElementById('copy-btn');
    const badge   = document.getElementById('badge');
    const badgeText = document.getElementById('badge-text');
    const subtext = document.getElementById('subtext');

    if (key) {
      keyText.textContent = key;
    } else {
      keyText.textContent = 'No key received. Try completing the checkpoint again.';
      keyBox.classList.add('error');
      copyBtn.disabled = true;
      badge.style.background = 'rgba(160,106,106,0.08)';
      badge.style.borderColor = 'rgba(160,106,106,0.2)';
      badge.style.color = 'var(--error)';
      badge.querySelector('.badge-dot').style.background = 'var(--error)';
      badge.querySelector('.badge-dot').style.boxShadow = '0 0 7px rgba(160,106,106,0.6)';
      badgeText.textContent = 'Key Not Found';
      subtext.textContent = 'Something went wrong. Please go back and complete the checkpoint again.';
    }

    // ── Copy ──
    function copyKey() {
      if (!key) return;
      navigator.clipboard.writeText(key).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        document.getElementById('btn-icon').textContent = '✓';
        copyBtn.style.background = 'linear-gradient(135deg, #5a8a6a 0%, #2e4e3a 100%)';
        setTimeout(() => {
          toast.classList.remove('show');
          document.getElementById('btn-icon').textContent = '⎘';
          copyBtn.style.background = '';
        }, 2200);
      });
    }

    // ── Star field ──
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [], W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars(count = 260) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x:     Math.random() * W,
          y:     Math.random() * H,
          r:     Math.random() * 1.1 + 0.15,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.003 + 0.001,
          drift: (Math.random() - 0.5) * 0.045,
        });
      }
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);
      for (const s of stars) {
        const a = 0.12 + 0.5 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed * 60));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(185,200,215,${a})`;
        ctx.fill();
        s.x += s.drift;
        if (s.x < 0) s.x = W;
        if (s.x > W) s.x = 0;
      }
    }

    function loop(t) { draw(t / 1000); requestAnimationFrame(loop); }
    resize(); initStars(); requestAnimationFrame(loop);
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>

</body>
</html>
